<!-- minimal-mistakes head custom hook: 한글 sans-serif + 핑크 액센트 미세 튜닝 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">

<style>
  body, .page__content, .page__hero-caption, .archive__item-title, .nav__list {
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: -0.01em;
  }
  .page__title, .archive__item-title a, h1, h2, h3 {
    font-family: "Playfair Display", "Noto Sans KR", Georgia, serif !important;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  /* 패션 잡지 느낌 — 본문 첫 글자 강조 */
  .page__content > p:first-of-type::first-letter {
    font-size: 2em;
    font-weight: 800;
    line-height: 1;
    color: #C2185B;   /* 진한 로즈/마젠타 */
    float: left;
    padding: 0.05em 0.1em 0 0;
    font-family: "Playfair Display", serif;
  }
  /* hero 캡션 더 강하게 — 큰 글씨 + 그림자 */
  .page__hero--overlay .page__title {
    font-size: 2.4em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.55);
  }
  /* archive 그리드 — 이미지 옆 카드 hover */
  .archive__item-teaser {
    transition: transform 0.3s ease;
  }
  .archive__item-teaser:hover {
    transform: scale(1.02);
  }
</style>
