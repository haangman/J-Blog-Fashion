<!-- minimal-mistakes 4.26.x 기본 comments.html 패턴. provider 분기 (giscus 등) -->
{% if page.comments %}
  <section class="page__comments">
    <h4 class="page__comments-title">{{ site.data.ui-text[site.locale].comments_title | default: "댓글" }}</h4>

    {% if site.comments.provider and page.comments != false %}
      {% include comments-providers/{{ site.comments.provider }}.html %}
    {% endif %}
  </section>
{% endif %}
