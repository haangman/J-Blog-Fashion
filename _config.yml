paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor/
